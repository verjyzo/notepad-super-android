name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Siapkan Python Modern
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bahan Baku Kompiler Android
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev ccache cpio bzip2 libgmp-dev libmpfr-dev libmpc-dev lld
          pip install --upgrade pip
          pip install --upgrade cython virtualenv buildozer

      - name: Mulai Proses Build APK
        run: |
          yes | buildozer android debug

      - name: Unggah Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Notepad-Super-Android
          path: bin/*.apk
